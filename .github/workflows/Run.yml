name: Run Bash Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Bash command to execute'
        required: true
        type: string
        default: 'echo "Hello World"'

jobs:
  execute-command:
    runs-on: ubuntu-latest
    
    steps:
      - name: Display the command being executed
        run: |
          echo "Executing command: ${{ github.event.inputs.command }}"
      
      - name: Run bash command
        id: run_command
        run: |
          # Execute the command and capture output and exit code
          set +e
          OUTPUT=$(eval "${{ github.event.inputs.command }}" 2>&1)
          EXIT_CODE=$?
          set -e
          
          # Save outputs for later steps
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Display output
          echo "Command output:"
          echo "$OUTPUT"
          
          # Display exit code
          echo "Exit code: $EXIT_CODE"
          
          # Fail the step if command failed
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Command failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
      
      - name: Summarize results
        if: always()
        run: |
          echo "## Command Execution Results" >> $GITHUB_STEP_SUMMARY
          echo "**Command:** \`${{ github.event.inputs.command }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Exit Code:** ${{ steps.run_command.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Output:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.run_command.outputs.output }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
