name: Download and Archive GGUF Model

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    env:
      # ⚠️ REPLACE THIS URL with the actual download link for Qwen3.5-4B-Q6_K.gguf
      MODEL_URL: "https://huggingface.co/TheBloke/Qwen2.5-4B-GGUF/resolve/main/Qwen2.5-4B-Q6_K.gguf"
      FILENAME: "Qwen3.5-4B-Q6_K.gguf"
      ZIPNAME: "Qwen3.5-4B-Q6_K.zip"

    steps:
      - name: Download GGUF file
        run: curl -L -o "${FILENAME}" "${MODEL_URL}"

      - name: Zip the file
        run: zip "${ZIPNAME}" "${FILENAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen-model
          path: ${{ env.ZIPNAME }}
          retention-days: 7   # Adjust as needed
