name: Download and archive Qwen3.5 4B GGUF

on:
  workflow_dispatch:          # Allows manual trigger

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub CLI
        run: pip install huggingface-hub

      - name: Download 4‑bit quantized GGUF model
        run: |
          hf download unsloth/Qwen3.5-4B-GGUF \
            Qwen3.5-4B-Q4_K_M.gguf \
            --local-dir ./model \
            --local-dir-use-symlinks False

      - name: Zip the model file
        run: |
          cd model
          zip ../qwen3.5-4b-q4.zip Qwen3.5-4B-Q4_K_M.gguf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3.5-4b-q4-model
          path: qwen3.5-4b-q4.zip
          retention-days: 90   # Optional, default is 90 days
